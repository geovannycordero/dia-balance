services:
  postgres:
    image: postgres:15-alpine
    container_name: dia-balance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dia-balance_db}
      POSTGRES_USER: ${POSTGRES_USER:-dia-balance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dia-balance_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init:/docker-entrypoint-initdb.d
    networks:
      - dia-balance-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-dia-balance_user} -d ${POSTGRES_DB:-dia-balance_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  dia-balance-network:
    driver: bridge

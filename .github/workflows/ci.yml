name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Lint, Type Check Job
  test:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

      - name: Generate Prisma client
        run: yarn prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

      - name: Run ESLint
        run: yarn lint

      - name: Run TypeScript type check
        run: yarn type-check

  # Build Job
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

      - name: Generate Prisma client
        run: yarn prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

      - name: Build application
        run: yarn build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db
          NEXTAUTH_SECRET: dummy-secret-for-build-only
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-files
          path: .next/
          retention-days: 7

  # Security Audit Job
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

      - name: Run security audit
        run: yarn audit --level moderate
        continue-on-error: true

      - name: Run dependency check
        run: yarn outdated
        continue-on-error: true

  # Database Migration Check (if Prisma is used)
  database:
    name: Database Migration Check
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'prisma/schema.prisma') || contains(github.event.head_commit.added, 'prisma/schema.prisma') || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dia-balance_db
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

      - name: Run database migrations
        run: yarn prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

      - name: Generate Prisma client
        run: yarn prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

  # Run pending migrations on main branch
  migrate:
    name: Run Pending Migrations
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dia-balance_db

      - name: Run pending migrations
        run: yarn prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate Prisma client
        run: yarn prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
